name: chat_accounting_app
description: AI Accounting Assistant with Rilakkuma theme

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  intl: ^0.18.1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  image_picker: ^1.0.7
  uuid: ^4.0.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/launcher_icon.jpg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/launcher_icon.jpg"
  adaptive_icon_background: "#FFF8E7"
  adaptive_icon_foreground: "assets/launcher_icon.jpg"
