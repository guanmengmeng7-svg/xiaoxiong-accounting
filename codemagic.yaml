workflows:
  ios-debug:
    name: iOS Debug Build (CocoaPods Fix)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Reintegrate CocoaPods from scratch
        script: |
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod deintegrate || true
          pod install --repo-update
      - name: Build iOS app for simulator
        script: flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - build/ios/iphonesimulator/**/*.app

  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Reintegrate CocoaPods from scratch
        script: |
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod deintegrate || true
          pod install --repo-update
      - name: Build iOS for release
        script: flutter build ios --release --no-codesign
    artifacts:
      - build/ios/iphone/Build/Products/Release-iphoneos/*.ipa

  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
      android: latest
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk