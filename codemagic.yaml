workflows:
  ios-debug:
    name: iOS Debug Build (CocoaPods Fix)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Reintegrate CocoaPods from scratch
        script: |
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod deintegrate || true
          pod install --repo-update
      - name: Build iOS app for simulator
        script: flutter build ios --debug --no-codesign
    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - build/ios/iphonesimulator/**/*.app

  ios-release-unsigned:
    name: iOS Release (Unsigned IPA for AltStore)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Reintegrate CocoaPods from scratch
        script: |
          cd ios
          rm -rf Pods Podfile.lock .symlinks
          pod deintegrate || true
          pod install --repo-update
      - name: Build iOS release (unsigned)
        script: flutter build ios --release --no-codesign
      - name: Locate .app and package as unsigned IPA
        script: |
          set -e
          echo "=== Searching for Runner.app ==="
          find build/ios -name "Runner.app" -type d 2>/dev/null
          APP_PATH=$(find build/ios -name "Runner.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: Runner.app not found"
            exit 1
          fi
          echo "Found: $APP_PATH"
          APP_DIR=$(dirname "$APP_PATH")
          cd "$APP_DIR"
          rm -rf Payload
          mkdir Payload
          cp -R Runner.app Payload/Runner.app
          zip -r Runner_unsigned.ipa Payload
          echo "=== IPA created ==="
          ls -la Runner_unsigned.ipa
    artifacts:
      - build/**/Runner_unsigned.ipa

  android-debug:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build Android APK
        script: flutter build apk --debug
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk
